name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type-check:
    name: Lint, Type Check & Governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install tools
        run: pip install -e ".[dev]" types-PyYAML

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: MyPy type check
        run: mypy src/nroute --strict

      - name: Validate Repository Structure
        run: python scripts/validate_repository.py

      - name: Validate Branch Name
        if: github.event_name == 'pull_request'
        run: python scripts/validate_branch_name.py "${{ github.head_ref }}"

      - name: Validate Commit Messages (Conventional Commits)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Validate PR Title (Primary check for Squash & Merge)
            PR_TITLE="${{ github.event.pull_request.title }}"
            echo "Validating PR Title: $PR_TITLE"
            python scripts/validate_commit_msg.py "$PR_TITLE"

            # Optional: Still check individual commits but don't fail if they are WIP
            git fetch origin ${{ github.base_ref }} --depth=50
            for commit in $(git log --format=%H origin/${{ github.base_ref }}..HEAD); do
              commit_msg=$(git log --format=%B -n 1 $commit)
              python scripts/validate_commit_msg.py "$commit_msg" || echo "Intermediate commit does not match CC, but PR Title is the authority."
            done
          else
            commit_msg=$(git log --format=%B -n 1 HEAD)
            python scripts/validate_commit_msg.py "$commit_msg"
          fi

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint-and-type-check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install libomp
          brew link libomp

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            export DYLD_LIBRARY_PATH="$(brew --prefix libomp)/lib:$DYLD_LIBRARY_PATH"
          fi
          pytest tests/ --cov=nroute --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run security audit
        run: pip-audit --strict
        continue-on-error: true

  docker-build:
    name: Docker Build, Scan & Publish
    runs-on: ubuntu-latest
    needs: [test, security]
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image for testing
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: nroute:ci-test

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nroute:ci-test'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: 'nroute:ci-test'
          artifact-name: 'nroute-sbom.spdx.json'
          output-format: 'spdx-json'

      - name: Log in to GitHub Container Registry (GHCR)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push release image
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  pypi-publish:
    name: Publish Release to PyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [test, security]
    permissions:
      id-token: write  # Mandatory for OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build source and wheel distributions
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Publish package distributions to PyPI
        uses: pypa/github-action-pypi-publish@release/v1

